<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Kucing Joget di Kepala 🐱</title>
  <style>
    body { text-align: center; background: #111; color: white; font-family: sans-serif; }
    canvas { border: 2px solid #444; border-radius: 12px; max-width: 100%; background: #000; }
    .loading { color: #ffcc00; }
    .success { color: #00ff00; font-weight: bold; }
  </style>
</head>
<body>

<h2>👃 Sentuh hidung -> kucing muncul di kepala 🐱</h2>
<p id="status" class="loading">Memuat Model AI...</p>

<canvas id="canvas" width="640" height="480"></canvas>
<video id="video" autoplay playsinline style="display:none"></video>

<!-- Library MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<!-- Library untuk memutar GIF di Canvas -->
<script src="https://unpkg.com/gifler@0.1.0/gifler.min.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const statusText = document.getElementById("status");

// 🐱 Setup GIF Animasi
let gifCanvas = document.createElement('canvas'); 
let gifAnimator = null;

// Tautan yang dijamin jalan (bebas CORS). 
// Jika ingin pakai file lokal, ganti jadi "images/kicau-maniaa.gif" dan jalankan via Live Server
const gifUrl = "https://media.tenor.com/1MCucyOSJ54AAAAi/kicau-maniaa.gif"; 

gifler(gifUrl).frames(gifCanvas, function(c, f) {
  gifAnimator = f; 
});

let detectedHands = [];
let headTop = null;
let showCat = false;

// ================= SETUP HANDS =================
const hands = new Hands({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});
// PERUBAHAN: maxNumHands diubah menjadi 2
hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

hands.onResults((results) => {
  // PERUBAHAN: Simpan semua tangan yang terdeteksi ke dalam array
  detectedHands = results.multiHandLandmarks || [];
});

// ================= SETUP FACE =================
const faceMesh = new FaceMesh({
  locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

faceMesh.onResults((results) => {
  if (!showCat) {
    statusText.innerText = "Sistem Aktif! Sentuh hidungmu sekarang.";
    statusText.className = "";
  }

  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 1. Gambar Video (Mirror)
  ctx.translate(canvas.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Cari Posisi Kepala & Hidung (jika wajah terdeteksi)
  let nosePos = null;
  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
      const face = results.multiFaceLandmarks[0];
      nosePos = { x: face[1].x * canvas.width, y: face[1].y * canvas.height };
      headTop = { x: face[10].x * canvas.width, y: face[10].y * canvas.height - 80 };
  }

  // 2. Gambar Titik-titik Tangan (Looping untuk kedua tangan)
  for (const handLms of detectedHands) {
    drawConnectors(ctx, handLms, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
    drawLandmarks(ctx, handLms, {color: '#FF0000', lineWidth: 1, radius: 3});
    
    // Logika Deteksi Sentuh Hidung untuk setiap tangan
    if (nosePos) {
        const finger = { x: handLms[8].x * canvas.width, y: handLms[8].y * canvas.height };
        const dist = Math.sqrt(Math.pow(finger.x - nosePos.x, 2) + Math.pow(finger.y - nosePos.y, 2));
        
        if (dist < 100) {
            showCat = true;
            statusText.innerText = "Kucing Muncul! 😻";
            statusText.className = "success";
        }
    }
  }
  ctx.restore();

  // 3. Gambar GIF Kucing
  if (showCat && headTop && gifAnimator) {
    const xPos = canvas.width - headTop.x; // Sesuaikan koordinat X akibat mirror
    const bounce = Math.sin(Date.now() * 0.005) * 10;

    ctx.save();
    ctx.translate(xPos, headTop.y + bounce);
    ctx.drawImage(gifCanvas, -75, -75, 150, 150);
    ctx.restore();
  }
});

// ================= Jalankan Kamera =================
const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({image: video});
    await faceMesh.send({image: video});
  },
  width: 640, height: 480
});
camera.start();
</script>
</body>
</html>

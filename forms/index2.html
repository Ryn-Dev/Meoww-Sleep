<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMB Premium Portal | Executive Enrollment</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #c5a059;
            --dark: #121212;
            --border-color: #e0e0e0;
            --light-bg: #fdfdfd;
        }

        body {
            background-color: white;
            font-family: 'Montserrat', sans-serif;
            color: var(--dark);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Luxury Header */
        .luxury-header {
            padding: 60px 0 30px 0;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .luxury-header:hover { background-color: var(--light-bg); }
        .luxury-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: -1px;
            margin: 0;
        }
        .luxury-header p {
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.7rem;
            color: var(--gold);
            font-weight: 600;
        }

        /* Navigation Cards */
        .menu-card {
            border: 1px solid var(--border-color);
            padding: 60px 40px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: var(--dark);
            text-decoration: none;
        }
        .menu-card:hover {
            border-color: var(--dark);
            background-color: var(--light-bg);
            transform: translateY(-8px);
        }
        .menu-card i {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 25px;
        }
        .menu-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Form Styling */
        .input-group-custom { margin-bottom: 30px; }
        .input-group-custom label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            color: #999;
            display: block;
            margin-bottom: 8px;
        }
        .form-luxury {
            border: none;
            border-bottom: 1px solid var(--border-color);
            border-radius: 0;
            padding: 12px 0;
            width: 100%;
            background: transparent;
            font-size: 1.1rem;
            transition: all 0.4s ease;
        }
        .form-luxury:focus { outline: none; border-bottom-color: var(--dark); }
        
        select.form-luxury { cursor: pointer; appearance: none; }

        .btn-luxury {
            background: var(--dark);
            color: white;
            border: 1px solid var(--dark);
            padding: 18px 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.4s ease;
            width: 100%;
        }
        .btn-luxury:hover { background: white; color: var(--dark); }

        .btn-back {
            background: transparent;
            border: none;
            color: #999;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--dark); }

        /* Results Box */
        .result-box {
            border: 1px solid var(--dark);
            padding: 50px;
            margin-top: 40px;
            display: none;
            background: white;
        }

        .section-view { display: none; animation: pageFade 0.6s ease; }
        .section-view.active { display: block; }

        @keyframes pageFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .kode-display {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

    <header class="luxury-header" onclick="showSection('main-menu')">
        <p>Admission Office 2026</p>
        <h1>THE REGISTRY</h1>
    </header>

    <div class="container pb-5">
        
        <div id="main-menu" class="section-view active">
            <div class="row g-5 justify-content-center">
                <div class="col-md-5">
                    <div class="menu-card" onclick="showSection('form-section')">
                        <i class="fa-solid fa-signature"></i>
                        <h3>Enrollment</h3>
                        <p class="text-muted small mt-2 italic">Daftarkan diri Anda pada program studi pilihan.</p>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="menu-card" onclick="showSection('search-section')">
                        <i class="fa-solid fa-shield-check"></i>
                        <h3>Verification</h3>
                        <p class="text-muted small mt-2 italic">Cek status pendaftaran melalui kode akses.</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="form-section" class="section-view">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <button class="btn-back" onclick="showSection('main-menu')"><i class="fa-solid fa-arrow-left me-2"></i> Kembali</button>
                    <h2 class="text-center mb-5" style="font-family: 'Playfair Display', serif; font-size: 2.5rem;">New Application</h2>
                    
                    <form id="regForm">
                        <div class="row g-4">
                            <div class="col-12">
                                <div class="input-group-custom">
                                    <label>Kode Pendaftaran (Maks 10 Karakter)</label>
                                    <input type="text" name="kode" class="form-luxury fw-bold" maxlength="10" placeholder="Contoh: PMB001" style="text-transform: uppercase; color: var(--gold);" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label>Nama Lengkap</label>
                                    <input type="text" name="nama" class="form-luxury" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label>Alamat Email</label>
                                    <input type="email" name="email" class="form-luxury" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label>Nomor WhatsApp</label>
                                    <input type="text" name="hp" class="form-luxury" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label>Gender</label>
                                    <select name="gender" id="genderSelect" class="form-luxury" onchange="updateOptions()" required>
                                        <option value="">PILIH GENDER</option>
                                        <option value="L">LAKI-LAKI (L)</option>
                                        <option value="P">PEREMPUAN (P)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label>Program Studi (Jurusan)</label>
                                    <select name="jurusan" id="jurusanSelect" class="form-luxury" required>
                                        <option value="">PILIH JURUSAN</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="input-group-custom">
                                    <label>Jalur Masuk</label>
                                    <select name="jalur" id="jalurSelect" class="form-luxury" required>
                                        <option value="">PILIH JALUR</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="input-group-custom">
                                    <label>Domisili / Alamat</label>
                                    <input type="text" name="alamat" class="form-luxury" required>
                                </div>
                            </div>
                        </div>
                        <div class="text-center mt-5">
                            <button type="submit" class="btn btn-luxury">Submit Application</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div id="search-section" class="section-view">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <button class="btn-back" onclick="showSection('main-menu')"><i class="fa-solid fa-arrow-left me-2"></i> Kembali</button>
                    <h2 class="text-center mb-5" style="font-family: 'Playfair Display', serif;">Guest Inquiry</h2>
                    
                    <div class="input-group-custom text-center">
                        <label>Masukkan Kode Pendaftaran atau No. HP</label>
                        <input type="text" id="searchInput" class="form-luxury text-center" placeholder="Ketik di sini...">
                    </div>
                    <button class="btn btn-luxury" onclick="searchData()">Verifikasi Data</button>

                    <div id="resultDisplay" class="result-box text-center">
                        <p class="text-muted small mb-1">REGISTRATION STATUS: <span class="text-success">VERIFIED</span></p>
                        <h1 id="resKode" class="kode-display mb-4"></h1>
                        <hr style="border-color: var(--gold); width: 60px; margin: 30px auto; opacity: 0.3;">
                        <h3 id="resNama" style="font-family: 'Playfair Display', serif; text-transform: uppercase;"></h3>
                        <p id="resContact" class="mb-4 text-muted small"></p>
                        
                        <div class="row text-start mt-4 border-top pt-4 g-3">
                            <div class="col-6">
                                <label class="text-muted small fw-bold">JURUSAN</label>
                                <p id="resJurusan" class="mb-0"></p>
                            </div>
                            <div class="col-6">
                                <label class="text-muted small fw-bold">JALUR MASUK</label>
                                <p id="resJalur" class="mb-0"></p>
                            </div>
                        </div>
                    </div>
                    <div id="errorMsg" class="text-center mt-4 text-danger d-none italic">Data tidak ditemukan dalam arsip kami.</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // GANTI DENGAN URL WEB APP KAMU
        const API_URL = "https://script.google.com/macros/s/AKfycbwNnODWnM_nFj8CW5gAsnfinkCn7lbR-3y5-tlcor1V6JrIB5RKYCwgOxXys-5Q9yPxng/exec";

        function showSection(id) {
            document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        // Logic Jurusan & Jalur Berdasarkan Gender
        function updateOptions() {
            const gender = document.getElementById('genderSelect').value;
            const jurusan = document.getElementById('jurusanSelect');
            const jalur = document.getElementById('jalurSelect');

            jurusan.innerHTML = '<option value="">PILIH JURUSAN</option>';
            jalur.innerHTML = '<option value="">PILIH JALUR</option>';

            if (gender === 'L') {
                ['TRPL', 'TRKJ', 'TRMG'].forEach(v => jurusan.innerHTML += `<option value="${v}">${v}</option>`);
                ['Beasiswa 100%', 'Beasiswa 50%', 'Reguler', 'Backpacker'].forEach(v => jalur.innerHTML += `<option value="${v}">${v}</option>`);
            } else if (gender === 'P') {
                ['TRPL', 'TRMG'].forEach(v => jurusan.innerHTML += `<option value="${v}">${v}</option>`);
                ['Beasiswa 100%', 'Beasiswa 50%', 'Reguler'].forEach(v => jalur.innerHTML += `<option value="${v}">${v}</option>`);
            }
        }

        // Submit Form
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(this));

            Swal.fire({
                title: 'AUTHENTICATING',
                text: 'Memproses data aplikasi Anda...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                const result = await response.json();

                if (result.status === 'success') {
                    Swal.fire({
                        icon: 'success',
                        title: 'SUCCESSFULLY ENROLLED',
                        text: 'Aplikasi pendaftaran Anda telah diterima.',
                        confirmButtonColor: '#121212'
                    }).then(() => showSection('main-menu'));
                    this.reset();
                } else {
                    Swal.fire('DENIED', result.message, 'error');
                }
            } catch (err) {
                Swal.fire('CONNECTION ERROR', 'Gagal menghubungi server.', 'error');
            }
        });

        // Search Data
        async function searchData() {
            const val = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!val) return;

            Swal.fire({ title: 'VERIFYING...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(API_URL);
                const allData = await res.json();
                
                // Cari di Kolom Kode (index 0) atau No HP (index 3)
                const user = allData.find(r => r[0].toString().toLowerCase() === val || r[3].toString() === val);

                Swal.close();
                const box = document.getElementById('resultDisplay');
                const error = document.getElementById('errorMsg');

                if (user) {
                    box.style.display = 'block';
                    error.classList.add('d-none');
                    document.getElementById('resKode').innerText = user[0];
                    document.getElementById('resNama').innerText = user[1];
                    document.getElementById('resContact').innerText = `${user[2]} | ${user[3]}`;
                    document.getElementById('resJurusan').innerText = user[4];
                    document.getElementById('resJalur').innerText = user[5];
                } else {
                    box.style.display = 'none';
                    error.classList.remove('d-none');
                }
            } catch (e) {
                Swal.fire('ERROR', 'Gagal memuat arsip data.', 'error');
            }
        }
    </script>
</body>
</html>

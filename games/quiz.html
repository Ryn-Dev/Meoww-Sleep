<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Quiz Online - Febryan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0096d6;
            --card-bg: #ffffff;
            --danger: #ff6b6b;
            --success: #00cc99;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-bg);
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: white; padding: 20px; box-sizing: border-box;
            user-select: none; /* Mencegah copy-paste teks */
        }

        .nav-header {
            width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px; border-radius: 50px;
            text-decoration: none; color: white; font-weight: bold;
            border: 2px solid white; background: rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s;
        }

        .btn:hover { background: white; color: var(--primary-bg); }

        .quiz-container {
            background: white; color: #333;
            width: 100%; max-width: 600px;
            padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            position: relative;
        }

        #timer {
            font-weight: 800; color: var(--danger);
            font-size: 1.2rem; text-align: right; margin-bottom: 10px;
        }

        .question { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            padding: 15px; border: 2px solid #eee;
            border-radius: 10px; background: none;
            cursor: pointer; text-align: left;
            font-size: 1rem; transition: 0.2s;
        }

        .option-btn:hover { background: #f0f9ff; border-color: var(--primary-bg); }

        #warning-log {
            margin-top: 20px; color: var(--danger);
            font-size: 0.85rem; font-weight: bold; text-align: center;
            background: rgba(255,107,107,0.1); padding: 10px; border-radius: 10px;
            display: none;
        }

        #result { display: none; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;"> <div class="nav-header">
        <a href="index.html" class="btn">🏠 KELUAR</a>
        <div style="font-weight: bold;">MODUL UJIAN</div>
    </div>

    <div class="quiz-container">
        <div id="quiz-box">
            <div id="timer">Sisa Waktu: 30s</div>
            <div id="question-text" class="question">Memuat soal...</div>
            <div class="options" id="options-box"></div>
            <div id="warning-log">Peringatan: Jangan berpindah tab!</div>
        </div>

        <div id="result">
            <h2>Ujian Selesai! 🎉</h2>
            <p>Skor Anda: <span id="score-val" style="font-size: 2rem; font-weight: 800; color: var(--primary-bg);">0</span></p>
            <p id="violation-count" style="color: var(--danger);"></p>
            <button class="btn" style="background: var(--primary-bg); color: white;" onclick="location.reload()">Ulangi Ujian</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Apa kepanjangan dari SQL?", a: ["Structured Query Language", "Simple Queue List", "System Quality Logic"], correct: 0 },
            { q: "Model arsitektur apa yang digunakan Laravel?", a: ["MVP", "MVC", "MVVM"], correct: 1 },
            { q: "Framework mobile yang dikembangkan Google adalah?", a: ["React Native", "Ionic", "Flutter"], correct: 2 },
            { q: "Metode K-Means termasuk dalam kategori?", a: ["Supervised Learning", "Unsupervised Learning", "Reinforcement Learning"], correct: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let timeLeft = 30;
        let violations = 0;
        let timerInterval;

        const qText = document.getElementById("question-text");
        const oBox = document.getElementById("options-box");
        const tDisp = document.getElementById("timer");
        const warnLog = document.getElementById("warning-log");

        // ANTI-CURANG: Deteksi Pindah Tab
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                violations++;
                warnLog.style.display = "block";
                warnLog.innerText = `Peringatan (${violations}): Jangan pindah tab! Pelanggaran dicatat.`;
            }
        });

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                tDisp.innerText = `Sisa Waktu: ${timeLeft}s`;
                if (timeLeft <= 0) endQuiz();
            }, 1000);
        }

        function loadQuestion() {
            const data = questions[currentIdx];
            qText.innerText = `${currentIdx + 1}. ${data.q}`;
            oBox.innerHTML = "";
            data.a.forEach((opt, i) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(i);
                oBox.appendChild(btn);
            });
        }

        function checkAnswer(i) {
            if (i === questions[currentIdx].correct) score += 25;
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            clearInterval(timerInterval);
            document.getElementById("quiz-box").style.display = "none";
            document.getElementById("result").style.display = "block";
            document.getElementById("score-val").innerText = score;
            document.getElementById("violation-count").innerText = `Total Pelanggaran: ${violations}`;
        }

        // Inisialisasi
        loadQuestion();
        startTimer();
    </script>
</body>
</html>

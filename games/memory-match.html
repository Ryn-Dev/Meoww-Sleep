<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Memory Game - Happy Edition</title>
    <style>
        body {
            background: #a29bfe; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }
        .btn-back {
            align-self: flex-start; padding: 10px 20px; background: white;
            border-radius: 50px; text-decoration: none; color: #333; font-weight: bold;
        }
        .grid {
            display: grid; grid-template-columns: repeat(4, 80px); gap: 10px;
            margin-top: 20px;
        }
        .card {
            width: 80px; height: 100px; background: #6c5ce7;
            border-radius: 15px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; font-size: 2rem;
            color: transparent; transition: 0.3s; border: 4px solid white;
        }
        .card.open { background: white; color: initial; transform: rotateY(180deg); }
        .card.match { background: #55efc4; color: white; cursor: default; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-back">⬅ Kembali</a>
    <h1 style="color: white;">Memory Match 🧩</h1>
    <p id="info" style="color: white;">Cari pasangan kartu yang sama!</p>
    
    <div class="grid" id="grid"></div>

    <script>
        const icons = ['🐱', '🐶', '🦊', '🦁', '🐸', '🐷', '🦄', '🐝'];
        let cards = [...icons, ...icons].sort(() => Math.random() - 0.5);
        let opened = [];
        const grid = document.getElementById('grid');

        cards.forEach((icon, i) => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerText = icon;
            div.onclick = () => {
                if (opened.length < 2 && !div.classList.contains('open')) {
                    div.classList.add('open');
                    opened.push(div);
                    if (opened.length === 2) {
                        if (opened[0].innerText === opened[1].innerText) {
                            opened.forEach(c => c.classList.add('match'));
                            opened = [];
                        } else {
                            setTimeout(() => {
                                opened.forEach(c => c.classList.remove('open'));
                                opened = [];
                            }, 700);
                        }
                    }
                }
            };
            grid.appendChild(div);
        });
    </script>
</body>
</html>

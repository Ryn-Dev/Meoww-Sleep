<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Febryan</title>
    <style>
        body {
            background-color: #0096d6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: white; padding: 20px; box-sizing: border-box;
        }

        .nav-buttons {
            width: 100%; max-width: 600px;
            display: flex; justify-content: space-between; margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px; border-radius: 50px;
            text-decoration: none; color: white; font-weight: bold;
            border: 2px solid white; background: rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
        }

        .btn:hover { background: white; color: #0096d6; }

        h1 { margin: 10px 0; letter-spacing: 2px; text-transform: uppercase; font-size: 1.8rem; }
        
        .stats { 
            background: rgba(0,0,0,0.2); padding: 10px 25px; 
            border-radius: 15px; margin-bottom: 20px; font-weight: bold;
        }

        /* Grid Game Responsive */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px; width: 100%; max-width: 400px;
            perspective: 1000px;
        }

        .card {
            aspect-ratio: 3 / 4; position: relative;
            transform-style: preserve-3d; transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex;
            align-items: center; justify-content: center;
            font-size: 2rem; border-radius: 12px; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-front {
            background-color: white; color: #333;
            transform: rotateY(180deg);
        }

        .card-back {
            background-color: #0077aa; color: white;
        }

        /* Animasi saat kartu cocok */
        .card.matched .card-front {
            background-color: #00cc99; color: white; border-color: #00cc99;
        }

        /* Modal / Overlay Kemenangan */
        #win-msg { display: none; margin-top: 20px; text-align: center; font-size: 1.2rem; }

        @media (max-width: 400px) {
            .game-grid { gap: 8px; }
            .card-face { font-size: 1.5rem; border-width: 2px; }
        }
    </style>
</head>
<body>

    <div class="nav-buttons">
        <a href="index.html" class="btn">🏠 MENU</a>
        <button class="btn" onclick="initGame()">🔄 MAIN LAGI</button>
    </div>

    <h1>Memory Match</h1>
    
    <div class="stats">
        Langkah: <span id="moves">0</span> | Pasangan: <span id="matches">0</span>/8
    </div>

    <div class="game-grid" id="grid">
        </div>

    <div id="win-msg">
        <h2>Luar Biasa, Febryan! 🎉</h2>
        <p>Kamu berhasil menyelesaikan permainan.</p>
    </div>

    <script>
        const icons = ['🚀', '💻', '⚽', '🎓', '🛠️', '📱', '🔋', '🔥'];
        let cards = [];
        let flippedCards = [];
        let matchedCount = 0;
        let moves = 0;
        let canFlip = true;

        const gridElement = document.getElementById('grid');
        const movesElement = document.getElementById('moves');
        const matchesElement = document.getElementById('matches');
        const winMsg = document.getElementById('win-msg');

        function initGame() {
            // Reset State
            gridElement.innerHTML = '';
            winMsg.style.display = 'none';
            cards = [...icons, ...icons].sort(() => Math.random() - 0.5);
            flippedCards = [];
            matchedCount = 0;
            moves = 0;
            canFlip = true;
            movesElement.innerText = moves;
            matchesElement.innerText = matchedCount;

            // Render Kartu
            cards.forEach((icon, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-face card-front">${icon}</div>
                    <div class="card-face card-back">?</div>
                `;
                card.onclick = () => flipCard(card);
                gridElement.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                movesElement.innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;

            if (card1.dataset.icon === card2.dataset.icon) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount++;
                matchesElement.innerText = matchedCount;
                flippedCards = [];
                canFlip = true;

                if (matchedCount === icons.length) {
                    winMsg.style.display = 'block';
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 800);
            }
        }

        // Jalankan game saat pertama kali buka
        initGame();
    </script>
</body>
</html>

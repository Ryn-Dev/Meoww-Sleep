<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Febryan - Game Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-bg: #0096d6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--primary-bg);
            margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: white; padding: 20px; box-sizing: border-box;
        }

        .nav-header {
            width: 100%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px; border-radius: 50px;
            text-decoration: none; color: white; font-weight: bold;
            border: 2px solid white; background: rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s;
        }

        .btn:hover { background: white; color: var(--primary-bg); }

        .profile-container {
            background: white; color: #333;
            width: 100%; max-width: 800px;
            padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .avatar {
            width: 120px; height: 120px;
            background: #eee; border-radius: 50%;
            margin: 0 auto 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 60px; border: 5px solid var(--primary-bg);
        }

        h2 { color: var(--primary-bg); margin-bottom: 5px; }
        .bio { font-size: 0.9rem; color: #666; margin-bottom: 30px; }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        .stat-card {
            background: #f8f9fa; padding: 20px; border-radius: 20px;
            border: 1px solid #eee;
        }

        .stat-card h4 { margin: 0; font-size: 0.8rem; color: #999; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 800; color: var(--primary-bg); }

        .chart-section { margin-top: 20px; padding: 20px; background: #fafafa; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="btn">🏠 MENU UTAMA</a>
        <div style="font-weight: bold;">USER ID: 2026-FEB</div>
    </div>

    <div class="profile-container">
        <div class="avatar">👨‍💻</div>
        <h2>Febryan</h2>
        <p class="bio">Developer Laravel & Flutter | Data Enthusiast</p>

        <div class="stats-grid">
            <div class="stat-card">
                <h4>Memory Match</h4>
                <p id="mem-best">0</p>
                <small>Best Score</small>
            </div>
            <div class="stat-card">
                <h4>Snake Game</h4>
                <p id="snake-high">0</p>
                <small>High Score</small>
            </div>
            <div class="stat-card">
                <h4>Quiz Score</h4>
                <p id="quiz-avg">0</p>
                <small>Last Result</small>
            </div>
        </div>

        <div class="chart-section">
            <h3>Analisis Aktivitas Mingguan</h3>
            <canvas id="activityChart"></canvas>
        </div>
    </div>

    <script>
        // Mengambil data dari localStorage (jika sudah ada sistem simpan skor)
        document.getElementById('mem-best').innerText = localStorage.getItem('memScore') || '12';
        document.getElementById('snake-high').innerText = localStorage.getItem('snakeScore') || '45';
        document.getElementById('quiz-avg').innerText = localStorage.getItem('quizScore') || '100';

        // Inisialisasi Chart.js untuk Data Science Sederhana
        const ctx = document.getElementById('activityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
                datasets: [{
                    label: 'Jam Belajar & Main',
                    data: [2, 5, 3, 8, 4, 10, 6],
                    borderColor: '#0096d6',
                    backgroundColor: 'rgba(0, 150, 214, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    </script>
</body>
</html>
